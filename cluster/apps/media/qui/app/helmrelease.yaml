---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qui
  namespace: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: qui
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.17.0@sha256:fb3832e68f66b056e1b049d16c40732661e7b73999bc642d4b11469a3ebbabd3
            env:
              QUI__AUTH_DISABLED: true
              QUI__I_ACKNOWLEDGE_THIS_IS_A_BAD_IDEA: true
              QUI__AUTH_DISABLED_ALLOWED_CIDRS: 0.0.0.0/0
              QUI__HOST: 0.0.0.0
              QUI__PORT: &port 80
              TZ: "America/Detroit"
            resources:
              requests:
                memory: 32Mi
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 3000
        runAsGroup: 3001
        fsGroup: 3001
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.servonet.lan"
        parentRefs:
          - name: envoy-internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        existingClaim: qui
      downloads:
        existingClaim: nas-downloads
      movies:
        existingClaim: nas-movies
      tv:
        existingClaim: nas-tv
      archive:
        existingClaim: nas-archive
