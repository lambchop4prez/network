---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.1.0/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: tvheadend
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            image:
              repository: ghcr.io/tvheadend/tvheadend
              tag: latest@sha256:bd00456aab44c0b645849121ce72ad619804889bf26b3a55227a591dd3834dbe
            env:
              TZ: "America/Detroit"
              PUID: 1000
              PGID: 1001
              SONARR__INSTANCE_NAME: Sonarr
              SONARR__PORT: &port 8989
            resources:
              requests:
                memory: 100Mi
                cpu: 20m
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    route:
      main:
        hostnames:
          - tv.servonet.lan
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        existingClaim: tvheadend
      dvb:
        enabled: true
        type: "hostPath"
        hostPath: /dev/dvb
        mountPath: /dev/dvb

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: feature.node.kubernetes.io/dvb-tuner
                operator: Exists
