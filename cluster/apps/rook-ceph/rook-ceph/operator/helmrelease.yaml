---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  values:
    monitoring:
      enabled: true
    csi:
      cephFSKernelMountOptions: ms_mode=prefer-crc
    image:
      repository: ghcr.io/rook/ceph
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 256Mi
