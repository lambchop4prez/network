---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: flux-system
spec:
  dependsOn:
    - name: rook-operator
    - name: rook-cluster
  interval: 1h
  path: ./cluster/apps/backup-system/volsync/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: network
    namespace: flux-system
  targetNamespace: backup-system
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-maintenance
  namespace: flux-system
spec:
  dependsOn:
    - name: volsync
  interval: 1h
  path: ./cluster/apps/backup-system/volsync/maintenance
  prune: true
  sourceRef:
    kind: GitRepository
    name: network
    namespace: flux-system
  targetNamespace: backup-system
  wait: false
