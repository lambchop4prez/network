---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
spec:
  interval: 1h
  path: ./cluster/apps/monitoring/grafana-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: network
    namespace: flux-system
  targetNamespace: monitoring
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-instance
spec:
  dependsOn:
    - name: grafana-operator
    - name: rook-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./cluster/apps/monitoring/grafana-operator/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: network
    namespace: flux-system
  targetNamespace: monitoring
  wait: false
