---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-3.1.0/charts/other/app-template/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tvheadend
  namespace: tv
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: tvheadend
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 3000
            runAsGroup: 3001
            fsGroup: 3001
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 44 # video group
              - 109 # render group
              - 568 # for NFS access
          nodeSelector:
            feature.node.kubernetes.io/dvb-tuner: "true"
        containers:
          main:
            image:
              repository: ghcr.io/tvheadend/tvheadend
              tag: latest@sha256:bd00456aab44c0b645849121ce72ad619804889bf26b3a55227a591dd3834dbe
            args:
              - --config
              - /var/lib/tvheadend
              - --firstrun
            env:
              TZ: "America/Detroit"
              PUID: 3000
              PGID: 3001
            resources:
              requests:
                memory: 100Mi
                cpu: 20m
            securityContext:
              privileged: true
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: &port 9981
            #       initialDelaySeconds: 30
            #       periodSeconds: 10
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: *port
            #       failureThreshold: 30
            #       periodSeconds: 10
    service:
      main:
        controller: main
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 192.168.42.103
        ports:
          http:
            port: 9981
            appProtocol: http
          htsp:
            port: 9982
            appProtocol: tcp
    route:
      main:
        hostnames:
          - tv.servonet.lan
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        existingClaim: tvheadend
        globalMounts:
          - path: /var/lib/tvheadend
      recordings:
        enabled: true
        type: nfs
        server: nas.lan
        path: /mnt/storage/media/recordings
        globalMounts:
          - path: /var/lib/tvheadend/recordings
      dvb:
        enabled: true
        type: hostPath
        hostPath: /dev/dvb
        globalMounts:
          - path: /dev/dvb

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: feature.node.kubernetes.io/dvb-tuner
                operator: Exists
